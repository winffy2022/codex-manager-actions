on:
  workflow_dispatch:          # 手动触发按钮
  # schedule:
  #   - cron: '0 0 * * *'       # 每天 UTC 0 点（北京时间早上 8 点）自动检查官方最新版

permissions:
  contents: write
  packages: write

jobs:
  # 阶段 0: 自动获取官方最新 Release 版本
  get-official-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: 获取官方最新版本
        id: get-tag
        run: |
          TAG=$(curl -s https://api.github.com/repos/qxcnm/Codex-Manager/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "✅ 官方最新版本: $TAG"

  # 阶段 1: 构建并推送 Docker 镜像（service + web，多架构）
  build-and-push:
    needs: get-official-version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: service
            dockerfile: docker/Dockerfile.service
            image: codexmanager-service
          - name: web
            dockerfile: docker/Dockerfile.web
            image: codexmanager-web
    steps:
      - name: Checkout 官方最新版本
        uses: actions/checkout@v4
        with:
          repository: qxcnm/Codex-Manager
          ref: ${{ needs.get-official-version.outputs.tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:upstream-${{ needs.get-official-version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 阶段 2: 创建 GitHub Release（跟随官方版本）
  release:
    name: Create GitHub Release
    needs: [get-official-version, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Release (自动跟随官方版本)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: upstream-${{ needs.get-official-version.outputs.tag }}
          name: Auto Sync from official ${{ needs.get-official-version.outputs.tag }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
