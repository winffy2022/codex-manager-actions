name: Auto Build Codex-Manager (双容器 Alpine 最小版)
on: 
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  get-official-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - name: 获取官方最新版本
        id: get-tag
        run: |
          TAG=$(curl -s https://api.github.com/repos/qxcnm/Codex-Manager/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=$TAG" >> $GITHUB_OUTPUT

  build-and-push:
    needs: get-official-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: qxcnm/Codex-Manager
          ref: ${{ needs.get-official-version.outputs.tag }}

      - name: Patch 官方 Dockerfile + 修复 axum routing
        run: |
          mkdir -p docker
          
          # === Patch codexmgr-service ===
          cp docker/Dockerfile.service docker/Dockerfile.service.min
          sed -i 's|^FROM rust:1-bookworm AS builder|FROM rust:1-alpine AS builder|' docker/Dockerfile.service.min
          sed -i '/^WORKDIR \/src$/a RUN apk add --no-cache musl-dev openssl-dev openssl-libs-static pkgconf build-base' docker/Dockerfile.service.min
          sed -i '/^RUN apk add --no-cache musl-dev openssl-dev openssl-libs-static pkgconf build-base/a ENV OPENSSL_STATIC=1ENV PKG_CONFIG_ALLOW_CROSS=1' docker/Dockerfile.service.min
          sed -i 's|^FROM debian:bookworm-slim|FROM alpine|' docker/Dockerfile.service.min
          sed -i '/apt-get update && apt-get install -y --no-install-recommends ca-certificates/d' docker/Dockerfile.service.min
          sed -i '/^WORKDIR \/app$/a RUN apk add --no-cache ca-certificates' docker/Dockerfile.service.min
          
          # === Patch codexmgr-web ===
          cp docker/Dockerfile.web docker/Dockerfile.web.min
          sed -i 's|^FROM node:20-bookworm-slim AS ui|FROM node:20-alpine AS ui|' docker/Dockerfile.web.min
          sed -i 's|^FROM rust:1-bookworm AS builder|FROM rust:1-alpine AS builder|' docker/Dockerfile.web.min
          sed -i '/^WORKDIR \/src$/a RUN apk add --no-cache musl-dev openssl-dev openssl-libs-static pkgconf build-base' docker/Dockerfile.web.min
          sed -i '/^RUN apk add --no-cache musl-dev openssl-dev openssl-libs-static pkgconf build-base/a ENV OPENSSL_STATIC=1ENV PKG_CONFIG_ALLOW_CROSS=1' docker/Dockerfile.web.min
          sed -i 's|^FROM debian:bookworm-slim|FROM alpine|' docker/Dockerfile.web.min
          sed -i '/apt-get update && apt-get install -y --no-install-recommends ca-certificates/d' docker/Dockerfile.web.min
          sed -i '/^WORKDIR \/app$/a RUN apk add --no-cache ca-certificates' docker/Dockerfile.web.min

          # === Fix axum v0.8+ root nesting panic in web ===
          sed -i 's|\.nest("/",|\.merge(|g' crates/web/src/main.rs
          sed -i 's|\.nest( "/",|\.merge(|g' crates/web/src/main.rs
          sed -i 's|nest("/",|merge(|g' crates/web/src/main.rs

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push codexmgr-service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.service.min
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/codexmgr-service:upstream-${{ needs.get-official-version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/codexmgr-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push codexmgr-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.web.min
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/codexmgr-web:upstream-${{ needs.get-official-version.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/codexmgr-web:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
